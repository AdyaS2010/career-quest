<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e295d" />
      <stop offset="100%" stop-color="#0a0f24" />
    </linearGradient>
    
    <!-- Active Gold Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    
    <!-- Active Emerald Gradient -->
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <!-- Outer circular frame with a glowing gold border -->
  <circle cx="32" cy="32" r="28" fill="url(#bg-grad)" stroke="url(#gold-grad)" stroke-width="2.5" />
  
  <!-- Subtle inner track -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="rgba(251, 191, 36, 0.15)" stroke-width="1" />

  <!-- Compass Directions / Accents -->
  <!-- N, S, E, W dots -->
  <circle cx="32" cy="8" r="1.5" fill="#fbbf24" />
  <circle cx="32" cy="56" r="1.5" fill="#d97706" />
  <circle cx="8" cy="32" r="1.5" fill="#d97706" />
  <circle cx="56" cy="32" r="1.5" fill="#d97706" />

  <!-- Fine dial ticks -->
  <line x1="32" y1="12" x2="32" y2="52" stroke="rgba(251, 191, 36, 0.1)" stroke-width="1" stroke-dasharray="1, 3" />
  <line x1="12" y1="32" x2="52" y2="32" stroke="rgba(251, 191, 36, 0.1)" stroke-width="1" stroke-dasharray="1, 3" />

  <!-- Compass Needle (Pointing Northeast for Ambition/Future) -->
  <!-- NE Needle: Left side (Emerald) -->
  <path d="M32 32 L27 27 L50 14 Z" fill="url(#emerald-grad)" />
  <!-- NE Needle: Right side (Gold) -->
  <path d="M32 32 L37 37 L50 14 Z" fill="url(#gold-grad)" />

  <!-- SW Needle (Shadow/Back-end): Left side (Gold translucent) -->
  <path d="M32 32 L27 27 L14 50 Z" fill="url(#gold-grad)" opacity="0.35" />
  <!-- SW Needle (Shadow/Back-end): Right side (Emerald translucent) -->
  <path d="M32 32 L37 37 L14 50 Z" fill="url(#emerald-grad)" opacity="0.35" />

  <!-- Center Hub / Pivot Cap -->
  <circle cx="32" cy="32" r="4" fill="#0f172a" />
  <circle cx="32" cy="32" r="2" fill="#fbbf24" />
</svg>
